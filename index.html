<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control de Asistencia</title>
<style>
  :root {
    --asfalto: #1c2128;
    --asfalto-suave: #2a3038;
    --linea-vial: #f2c94c;
    --entrada: #2ea043;
    --salida: #d1453b;
    --texto-claro: #eef1f4;
    --texto-tenue: #9aa4b1;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--asfalto);
    background-image:
      repeating-linear-gradient(180deg, transparent 0 62px, rgba(242,201,76,0.06) 62px 66px);
    color: var(--texto-claro);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .tarjeta {
    width: 100%;
    max-width: 420px;
    background: var(--asfalto-suave);
    border-radius: 18px;
    padding: 28px 24px 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.06);
  }

  .encabezado { text-align: center; margin-bottom: 22px; }
  .encabezado .eyebrow {
    color: var(--linea-vial);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }
  .encabezado h1 {
    font-size: 21px;
    margin-top: 6px;
    font-weight: 700;
  }

  .reloj {
    text-align: center;
    font-variant-numeric: tabular-nums;
    font-size: 34px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 10px 0 4px;
  }
  .fecha {
    text-align: center;
    color: var(--texto-tenue);
    font-size: 13px;
    margin-bottom: 18px;
  }

  select {
    width: 100%;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: var(--asfalto);
    color: var(--texto-claro);
    font-size: 15px;
    margin-bottom: 18px;
  }

  .botones { display: flex; gap: 12px; }

  button {
    flex: 1;
    padding: 16px 10px;
    border: none;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.08s ease, filter 0.15s ease;
    color: #fff;
  }
  button:active { transform: scale(0.97); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-entrada { background: var(--entrada); }
  .btn-salida { background: var(--salida); }

  .estado {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    min-height: 18px;
    color: var(--texto-tenue);
  }
  .estado.ok { color: var(--entrada); }
  .estado.error { color: var(--salida); }

  .pie {
    margin-top: 18px;
    text-align: center;
    font-size: 11px;
    color: var(--texto-tenue);
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="tarjeta">
  <div class="encabezado">
    <div class="eyebrow">Control de asistencia</div>
    <h1 id="tituloEmpleado">Registro de jornada</h1>
  </div>

  <div class="reloj" id="reloj">--:--:--</div>
  <div class="fecha" id="fecha">-</div>

  <select id="empleado">
    <option value="">Selecciona tu nombre...</option>
    <!-- Agrega aquí una línea por cada empleado adicional -->
    <option value="Martha González González">Martha González González</option>
    <option value="Ricardo Gómez">Ricardo Gómez</option>
    <option value="Thamara Otálora">Thamara Otálora</option>
    <option value="Sandra López">Sandra López</option>
  </select>

  <div class="botones">
    <button class="btn-entrada" id="btnEntrada">Marcar entrada</button>
    <button class="btn-salida" id="btnSalida">Marcar salida</button>
  </div>

  <div class="estado" id="estado"></div>
  <div class="pie">Se solicitará acceso a tu ubicación para confirmar el registro</div>
</div>

<script>
  // ======= CONFIGURA ESTOS 5 VALORES CON LOS DATOS DE TU GOOGLE FORM =======
  const FORM_ACTION_URL = "https://docs.google.com/forms/d/e/1FAIpQLSetni06nvpu7-SEEznKZFul5i78KnH_nVpMWE7L4cXdO5i06g/formResponse";
  const ENTRY_EMPLEADO   = "entry.526956195";  // campo "Empleado"
  const ENTRY_TIPO       = "entry.1730806702"; // campo "Tipo de registro"
  const ENTRY_UBICACION  = "entry.512247256";  // campo "Ubicación"
  const ENTRY_HORA       = "entry.138426198";  // campo "Hora"
  // ==========================================================================

  const reloj = document.getElementById('reloj');
  const fecha = document.getElementById('fecha');
  const estado = document.getElementById('estado');
  const empleadoSelect = document.getElementById('empleado');
  const btnEntrada = document.getElementById('btnEntrada');
  const btnSalida = document.getElementById('btnSalida');

  function actualizarReloj() {
    const ahora = new Date();
    reloj.textContent = ahora.toLocaleTimeString('es-CO', { hour12: false });
    fecha.textContent = ahora.toLocaleDateString('es-CO', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
  }
  actualizarReloj();
  setInterval(actualizarReloj, 1000);

  function marcar(tipo) {
    if (!empleadoSelect.value) {
      estado.textContent = "Selecciona tu nombre antes de marcar.";
      estado.className = "estado error";
      return;
    }

    btnEntrada.disabled = true;
    btnSalida.disabled = true;
    estado.textContent = "Obteniendo tu ubicación...";
    estado.className = "estado";

    if (!navigator.geolocation) {
      estado.textContent = "Este navegador no soporta geolocalización.";
      estado.className = "estado error";
      btnEntrada.disabled = false;
      btnSalida.disabled = false;
      return;
    }

    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        const ubicacion = `${lat}, ${lng}`;
        const horaTexto = new Date().toLocaleString('es-CO');

        enviarAGoogleForm({
          [ENTRY_EMPLEADO]: empleadoSelect.value,
          [ENTRY_TIPO]: tipo,
          [ENTRY_UBICACION]: ubicacion,
          [ENTRY_HORA]: horaTexto
        });

        estado.textContent = `${tipo} registrada correctamente a las ${new Date().toLocaleTimeString('es-CO')}.`;
        estado.className = "estado ok";
        btnEntrada.disabled = false;
        btnSalida.disabled = false;
      },
      (err) => {
        estado.textContent = "No pudimos obtener tu ubicación. Debes permitir el acceso al GPS.";
        estado.className = "estado error";
        btnEntrada.disabled = false;
        btnSalida.disabled = false;
      },
      { enableHighAccuracy: true, timeout: 10000 }
    );
  }

  function enviarAGoogleForm(datos) {
    const iframeName = 'iframe_envio_oculto';
    let iframe = document.getElementById(iframeName);
    if (!iframe) {
      iframe = document.createElement('iframe');
      iframe.name = iframeName;
      iframe.id = iframeName;
      iframe.style.display = 'none';
      document.body.appendChild(iframe);
    }

    const form = document.createElement('form');
    form.action = FORM_ACTION_URL;
    form.method = 'POST';
    form.target = iframeName;

    Object.keys(datos).forEach(key => {
      const input = document.createElement('input');
      input.type = 'hidden';
      input.name = key;
      input.value = datos[key];
      form.appendChild(input);
    });

    document.body.appendChild(form);
    form.submit();
    document.body.removeChild(form);
  }

  btnEntrada.addEventListener('click', () => marcar('Entrada'));
  btnSalida.addEventListener('click', () => marcar('Salida'));
</script>

</body>
</html>
